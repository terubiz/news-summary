version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: news-summary-postgres
    environment:
      POSTGRES_DB: news_summary
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d news_summary"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news-summary-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/news_summary
      DATABASE_USERNAME: appuser
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
      JWT_SECRET: ${JWT_SECRET:-changeme-this-is-a-very-long-secret-key-for-jwt-signing-at-least-256-bits}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-changeme-this-is-a-32-byte-key!}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      STOCK_API_KEY: ${STOCK_API_KEY:-}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news-summary-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
